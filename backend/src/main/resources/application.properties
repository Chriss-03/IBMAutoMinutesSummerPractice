spring.application.name=autominutes

# Default local profile: in-memory H2 database.
# Use SPRING_PROFILES_ACTIVE=postgres to run against PostgreSQL.
spring.datasource.url=jdbc:h2:mem:autominutesdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

springdoc.swagger-ui.path=/swagger-ui.html

# Mock AI is used by default so the backend runs without an API key.
# Set LLM_ENABLED=true and configure LLM_API_KEY to use a real provider.
llm.enabled=${LLM_ENABLED:false}
llm.base-url=${LLM_BASE_URL:https://api.openai.com/v1}
llm.api-key=${LLM_API_KEY:}
llm.model=${LLM_MODEL:gpt-4o-mini}
llm.temperature=${LLM_TEMPERATURE:0.2}
llm.timeout-seconds=${LLM_TIMEOUT_SECONDS:60}
