services:
  postgres:
    image: postgres:16
    container_name: autominutes-postgres
    environment:
      POSTGRES_DB: autominutes
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - autominutes-postgres-data:/var/lib/postgresql/data

volumes:
  autominutes-postgres-data:
